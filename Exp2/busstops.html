<!DOCTYPE html>
<html>
<head>
    <title>Bus Stop Details</title>

    <style>
        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #267c58;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Bus Stop Details</h2>

<table>
    <tr>
        <th>Stop Name</th>
        <th>Arrival Time</th>
    </tr>
    <tr>
        <td>Central Station</td>
        <td>08:00 AM</td>
    </tr>
    <tr>
        <td>Main Market</td>
        <td>08:15 AM</td>
    </tr>
</table>

</body>
</html>
